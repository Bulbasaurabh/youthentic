# render.yaml — place in your backend root folder
# Render uses this for auto-deploy configuration

services:
  - type: web
    name: youthentic-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false          # you'll paste this in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # set to your Netlify URL after deploying frontend